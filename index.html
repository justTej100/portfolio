<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <title>Tejinder Tj Bajaj</title>
  </head>

  <body>

    <div id="introOverlay">
      <div id="introPct">0<span id="introPctSign">%</span></div>
    </div>

    <main>
      <div class="tejinder">
        <canvas id="nameCanvas" onclick="triggerName()"></canvas>

        <div class="buttonC">
          <button>About</button>
          <button>Work EXP</button>
          <button>Resume</button>
          <button>Contact</button>
        </div>
      </div>
    </main>

    <div class="waves-wrap">
      <div>
        <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
          viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
          <defs>
            <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
          </defs>
          <g class="parallax">
            <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(0,0,0,0.7)" />
            <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(0,0,0,0.5)" />
            <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(0,0,0,0.3)" />
            <use xlink:href="#gentle-wave" x="48" y="7" fill="rgba(0,0,0,1)" />
          </g>
        </svg>
      </div>

      <div class="flip-upside-down">
        <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
          viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
          <defs>
            <path id="gentle-wave2" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
          </defs>
          <g class="parallax">
            <use xlink:href="#gentle-wave2" x="48" y="0" fill="rgba(0,0,0,0.7)" />
            <use xlink:href="#gentle-wave2" x="48" y="3" fill="rgba(0,0,0,0.5)" />
            <use xlink:href="#gentle-wave2" x="48" y="5" fill="rgba(0,0,0,0.3)" />
            <use xlink:href="#gentle-wave2" x="48" y="7" fill="rgba(0,0,0,1)" />
          </g>
        </svg>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
